<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squirrel Translator Engine (Alpha v0.1)</title>
    <!-- Use local font-awesome so there aren't loading issues-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- We can import the root styles to maintain the same branding -->
    <link rel="stylesheet" href="/assets/css/styles.css">

    <style>
        body,
        html {
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--primary-font);
        }

        .project-container {
            max-width: 600px;
            width: 90%;
            text-align: center;
            padding: 4rem 2rem;
            position: relative;
        }

        .project-header {
            color: var(--warning);
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            text-shadow: 0 0 10px rgba(234, 179, 8, 0.4);
        }

        .waveform {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 5px;
            height: 100px;
            margin: 3rem 0;
        }

        .bar {
            width: 8px;
            height: 10px;
            background: #4ade80;
            border-radius: 4px;
            animation: bounceWave 1s infinite alternate;
            box-shadow: 0 0 8px #4ade80;
        }

        .bar:nth-child(1) {
            animation-delay: 0.1s;
        }

        .bar:nth-child(2) {
            animation-delay: 0.4s;
            height: 30px;
        }

        .bar:nth-child(3) {
            animation-delay: 0.2s;
            height: 70px;
        }

        .bar:nth-child(4) {
            animation-delay: 0.6s;
            height: 40px;
        }

        .bar:nth-child(5) {
            animation-delay: 0.3s;
            height: 90px;
        }

        .bar:nth-child(6) {
            animation-delay: 0.7s;
            height: 50px;
        }

        .bar:nth-child(7) {
            animation-delay: 0.5s;
            height: 80px;
        }

        .bar:nth-child(8) {
            animation-delay: 0.8s;
            height: 20px;
        }

        @keyframes bounceWave {
            0% {
                transform: scaleY(0.5);
                filter: opacity(0.5);
            }

            100% {
                transform: scaleY(1.2);
                filter: opacity(1);
            }
        }

        .status-log {
            font-family: 'Courier New', Courier, monospace;
            color: #94a3b8;
            font-size: 0.9rem;
            border: 1px dashed #334155;
            padding: 1rem;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.3);
            text-align: left;
            margin-bottom: 2rem;
        }

        .return-btn {
            display: inline-block;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <div class="project-container glass-panel">
        <h1 class="project-header">
            <i class="fa-solid fa-satellite-dish"></i> Squirrel Translator Engine
        </h1>
        <p style="color: var(--text-secondary);">Alpha Model v0.1 • Neural Linguistic Mapping</p>

        <div class="waveform">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="status-log">
            > [SYSTEM] Audio receptors active.<br>
            > [SYSTEM] Awaiting environmental rodent acoustic input...<br>
            > [SYSTEM] Filtering background noise...<br>
            <span style="color: #4ade80; animation: flash 1.5s infinite;">_</span>
        </div>

        <a href="/" class="btn primary-btn return-btn">
            <i class="fa-solid fa-arrow-left"></i> Return to The Sacred Timeline
        </a>
    </div>

    <script>
        // Simple interactivity for the mini-project out of the box
        const log = document.querySelector('.status-log');
        const messages = [
            "Detecting chittering patterns...",
            "Matching localized nut-hoarding algorithms...",
            "Translate error: Expletive concerning local canine.",
            "Recalibrating model...",
            "Awaiting more audio..."
        ];

        let msgIndex = 0;
        setInterval(() => {
            log.innerHTML += `<br>> [AI_CORE] ${messages[msgIndex]}`;
            msgIndex = (msgIndex + 1) % messages.length;

            // Auto scroll or truncate logic if necessary
            if (log.innerHTML.length > 500) {
                log.innerHTML = '> [SYSTEM] Console flushed.<br><span style="color: #4ade80; animation: flash 1.5s infinite;">_</span>';
            }
        }, 3500);
    </script>
</body>

</html>
